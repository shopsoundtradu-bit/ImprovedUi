<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover"
/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#0082FF">

<title>OLED Canvas Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #f1f2f5;
    --accent-white: #4F5055;
    --bar-height: 100px;
    --top-height: 70px;
  }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    /* Back to your clean, light gray background */
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    width: 100%;
    margin: 0;
    padding: 0;
  }
  
/* ── TOP BAR ── */
.top-bar {
  position: relative;
  
  /* Gradient */
  background: linear-gradient(90deg, #0082FF 0%, #00FFFD 100%);
  
  /* Safe area support */
  padding-top: env(safe-area-inset-top);
  
  /* Internal spacing */
  padding-left: 24px;
  padding-right: 24px;
  padding-bottom: 0;
  
  /* Total height INCLUDING notch/status bar */
  height: calc(var(--top-height) + env(safe-area-inset-top));
  
  /* Layout */
  display: flex;
  align-items: center;
  justify-content: space-between;
  
  /* Prevent weird iOS sizing bugs */
  box-sizing: border-box;
  width: 100%;
  
  /* Layering */
  flex-shrink: 0;
  z-index: 999;
  
  /* Helps Safari render correctly */
  overflow: hidden;
}

  .top-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .icon-btn-small {
    width: 36px;
    height: 36px;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    position: relative;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none; 
  }

  .canvas-card {
    width: min(85vw, 360px);
    aspect-ratio: 1/1;
    background: #ffffff;
    border-radius: 0px; 
    box-shadow: 0 10px 40px rgba(255,255,255,0.05); 
    z-index: 1;
    transform-origin: center center;
    will-change: transform;
  }

  /* ── ZOOM INDICATOR (Pill Shaped) ── */
  .zoom-indicator {
    position: absolute;
    bottom: 12px;
    left: 24px;
    background: #4F5055;
    color: white;
    padding: 6px 14px;
    border-radius: 32px;
    font-size: 12px;
    font-weight: 700;
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .zoom-indicator.visible {
    opacity: 1;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    height: var(--bar-height);
    background: var(--bg);
    display: flex;
    align-items: center;
    z-index: 20;
    position: relative;
  }

  .bottom-scroll {
    display: flex;
    align-items: center;
    width: 100%;
    overflow-x: auto;
    padding: 0 2px;
    gap: 1px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .bottom-scroll::-webkit-scrollbar { display: none; }

  .tool-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 80px;
    height: 80px;
    border: none;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
  }

  .tool-label {
    font-size: 11px;
    color: #4F5055;
    letter-spacing: 0.08em;
  }

  /* ── SEND BUTTON STATES ── */
  .send-circle { 
    width: 34px; height: 34px; 
    background: white; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer;
  }
  .send-circle .svg-empty { display: block; }
  .send-circle .svg-typing { display: none; }
  .send-circle.has-text .svg-empty { display: none; }
  .send-circle.has-text .svg-typing { display: block; }

</style>
</head>
<body>

<div class="top-bar">
  <div class="top-group">
    
    <a href=""><button class="icon-btn-small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </button></a>
    
    <button class="icon-btn-small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9l6 6-6 6"/><path d="M4 4v7a4 4 0 0 0 4 4h11"/></svg>
    </button>
    
    
    
    <button class="icon-btn-small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 16l-6-6 6-6"/><path d="M20 21v-7a4 4 0 0 0-4-4H5"/></svg>
    </button>
  </div>

  <div class="top-group">
    
    <button class="icon-btn-small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
    </button>
    <button class="icon-btn-small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </button>
        <button class="icon-btn-small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 8l-5-5-5 5M12 4.2v10.3"/></svg>
    </button>
      
    </div>
  </div>
</div>

<div class="canvas-area">
  <div class="zoom-indicator" id="zoomLevel">100%</div>
  <div class="canvas-card" id="canvasCard"></div>
</div>

<div class="bottom-bar">
  <div class="bottom-scroll">
    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      <span class="tool-label">Elements</span>
    </div>
    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      <span class="tool-label">Speech</span>
    </div>
    
    <div class="tool-item">
      
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
      <span class="tool-label">Text</span>
    </div>
    
    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M21 12H3M12 3v18"/></svg>
      <span class="tool-label">Frames</span>
    </div>

    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g transform="translate(2 3)"><path d="M20 16a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3l2-3h6l2 3h3a2 2 0 0 1 2 2v11z"/><circle cx="10" cy="10" r="4"/></g></svg>
      <span class="tool-label">Library</span>
    </div>
    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"></path><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"></polygon></svg>
      <span class="tool-label">Notes</span>
    </div>
    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span class="tool-label">Templates</span>
    </div>
    <div class="tool-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4F5055" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      <span class="tool-label">Brand</span>
    </div>
  </div>
</div>

<script>
  const canvasArea = document.querySelector('.canvas-area');
  const canvasCard = document.getElementById('canvasCard');
  const zoomIndicator = document.getElementById('zoomLevel');
  
  let scale = 1;
  const MIN_SCALE = 0.5;
  const MAX_SCALE = 5;
  let fadeTimer = null;

  function showZoomIndicator() {
    zoomIndicator.classList.add('visible');
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => {
      zoomIndicator.classList.remove('visible');
    }, 1000); // Fades out after 1 second of inactivity
  }

  function updateZoom(newScale) {
    scale = Math.min(Math.max(newScale, MIN_SCALE), MAX_SCALE);
    canvasCard.style.transform = `scale(${scale})`;
    zoomIndicator.textContent = `${Math.round(scale * 100)}%`;
    showZoomIndicator();
  }

  // Mouse Wheel Zoom
  canvasArea.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    updateZoom(scale * delta);
  }, { passive: false });

  // Pinch Zoom Logic
  let initialDistance = null;
  canvasArea.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );
      if (initialDistance === null) {
        initialDistance = dist;
      } else {
        const delta = dist / initialDistance;
        updateZoom(scale * delta);
        initialDistance = dist;
      }
    }
  });

  canvasArea.addEventListener('touchend', () => { initialDistance = null; });
</script>

</body>
</html>
