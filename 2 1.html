<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
  .container { width: 100%; max-width: 360px; padding-top: 40px; }
  
  .back-btn { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px;
  display: flex;
  align-items: center;
  margin-bottom: 32px; transition: 0.2s; }
  .back-btn:hover { color: #fff; }

  .header-section { margin-bottom: 40px; }
  .header-section h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; }
  .header-section p { font-size: 17px; color: rgba(255,255,255,0.6); }

  a {
    color: rgba(255,255,255,0.5);
  }

  .input-field {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 18px; color: white; font-size: 16px; outline: none; margin-bottom: 12px; text-align: left;
  }
  
  .btn-primary {
    width: 100%; background: #111; color: rgba(255,255,255,0.3); border: none; padding: 18px;
    border-radius: 14px; font-size: 16px; font-weight: 600; cursor: not-allowed; transition: 0.3s;
  }
  .btn-primary.active { background: #fff; color: #000; cursor: pointer; }

  .legal-group { display: flex; flex-direction: column; gap: 14px; margin: 24px 0; }
  .checkbox-item { display: flex; align-items: center; gap: 12px; cursor: pointer;}
  .checkbox-item input { appearance: none; width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 6px; flex-shrink: 0; cursor: pointer; }
  .checkbox-item input:checked { background: #fff; border-color: #fff; }
  .checkbox-text { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.4; }
</style>
</head>
<body>
  <div class="container">
    <a href="previous page" class="back-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back</a>
    <div class="header-section">
      <h1>New Account</h1>
      <p>You used Google or Apple to sign in for the first time, to continue review these</p>
    </div>
    <input type="text" class="input-field" placeholder="{nameFromAuthProvider}">
    <div class="legal-group">
      <label class="checkbox-item"><input type="checkbox"><span class="checkbox-text">I agree to the <a href="Terms">Terms</a> and <a href="Privacy">Privacy Policy</a> .</span></label>
      <label class="checkbox-item"><input type="checkbox"><span class="checkbox-text">Send me creative updates and news (optional).</span></label>
    </div>

    <button class="btn-primary">Create Account</button>
  </div>
</body>
</html>
