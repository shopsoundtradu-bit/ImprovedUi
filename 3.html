<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
  .container { width: 100%; max-width: 360px; padding-top: 40px; }
  
  .back-btn { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px;
  display: flex;
  align-items: center;
  margin-bottom: 32px; transition: 0.2s; }

  .header-section { margin-bottom: 40px; }
  .header-section h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; }
  .header-section p { font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.5; }

  .otp-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; max-width: 280px; }
  .otp-input {
    width: 100%; aspect-ratio: 1/1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; color: white; font-size: 24px; text-align: center; outline: none;
  }
  .otp-input:focus { border-color: #fff; }

  .btn-verify { width: 100%; background: #111; color: rgba(255,255,255,0.3); border: none; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 600; }
</style>
</head>
<body>
  <div class="container">
    <a href="previous page" class="back-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back</a>
    <div class="header-section">
      <h1>Check your mail</h1>
      <p>Enter the 4-digit code we sent to your email.</p>
    </div>

    <div class="otp-group">
      <input type="text" maxlength="1" class="otp-input" autofocus>
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
    </div>

    <button class="btn-verify">Verify</button>
  </div>
</body>
</html>
