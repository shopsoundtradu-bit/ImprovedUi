<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign In</title>
<link rel="stylesheet" href="../../assets/theme.css">
<link rel="stylesheet" href="style.css">
<script src="../../assets/theme.js"></script>
</head>
<body>
  <div class="container">
    <div class="header-section">
      <div class="logo-wrap">
        <img src="../../assets/icons/brand-logo.svg" alt="Cellore logo">
      </div>
      <h1>Cellore, tell a story.</h1>

    </div>

    <div class="social-group">
      <button class="btn-social">
        <img src="../../assets/icons/google-icon.svg" alt="Google">
        Continue with Google
      </button>

      <button class="btn-social">
        <img src="../../assets/icons/apple-icon.svg" alt="Apple">
        Continue with Apple
      </button>
    </div>

    <div class="divider">or</div>

    <input type="text" id="userInput" class="input-field" placeholder="Email or username">
    <button id="nextBtn" class="btn-continue">Continue</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
