<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --surface: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.6);
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    padding-top: 60px;
  }

  /* Header Section */
  .header-section {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-wrap {
    margin-bottom: 10px;
    display: flex;
    justify-content: center;
  }
  /* Your custom brand logo size */
  .logo-wrap svg { width: 150px; height: 150px; }
  
  .header-section h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
  .header-section p { font-size: 17px; color: var(--text-secondary); }

  /* Social Buttons */
  .social-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  
  .btn-social {
    background: #ffffff;
    border: none;
    color: #000000;
    padding: 14px;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }

  .btn-social:hover {
    opacity: 0.9;
  }

  .btn-social:active {
    transform: scale(0.98);
  }

  /* Social Icon Styling */
  .btn-social svg {
    width: 20px;
    height: 20px;
  }

  .divider { 
    margin: 24px 0; 
    display: flex; 
    align-items: center; 
    color: rgba(255,255,255,0.2); 
    font-size: 12px; 
    text-transform: uppercase; 
    letter-spacing: 1px;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 15px; }

  /* Input & Primary Button */
  .input-field {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    color: white;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .input-field:focus {
    border-color: rgba(255,255,255,0.3);
  }

  .btn-continue {
    width: 100%;
    background: #111;
    color: rgba(255,255,255,0.3);
    border: none;
    padding: 18px;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: not-allowed;
    transition: all 0.3s;
  }

  .btn-continue.active { 
    background: #ffffff; 
    color: #000000; 
    cursor: pointer; 
  }
</style>
</head>

    const button = document.getElementById('nextBtn');
    input.addEventListener('input', () => {
      button.className = input.value.trim().length > 0 ? 'btn-continue active' : 'btn-continue';
    });
